server:
  port: 8081
  servlet:
    context-path: /
    encoding:
      enabled: true
      force: true
      force-request: true
      force-response: true
  tomcat:
    uri-encoding: UTF-8
  shutdown: graceful
spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  application:
    name: dzt-app-web
  lifecycle:
    timeout-per-shutdown-phase: 30s
  profiles:
    active: dev
  session:
    store-type: none
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
logging:
  level:
    org.springframework.security: debug
    # 将 NoResourceFoundException 的日志级别设为 WARN 或 ERROR
    org.springframework.web.servlet.resource.NoResourceFoundException: WARN
    # 或者完全关闭这个日志
    # org.springframework.web.servlet.resource.NoResourceFoundException: OFF
    # 方式1：针对整个 resource 包
    org.springframework.web.servlet.resource: WARN
    # 方式2：针对更具体的类
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: WARN
    # 方式3：针对 NoResourceFoundException 的日志记录器
    org.springframework.web.servlet.PageNotFound: WARN
mybatis:
  #type-aliases-package: tk.mybatis.springboot.model
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package=net:
    codingme:
      boot:
        domain: com.idaymay.dzt.dao.mysql.domain
mybatis-plus:
  configuration:
    log-impl:
  type-aliases-package: com.idaymay.dzt.dao.mysql.domain
cache:
  prefix: 0.1.0

